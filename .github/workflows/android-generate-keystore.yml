name: Generar keystore de Android (correr UNA sola vez)

on:
  workflow_dispatch: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generar keystore con passwords aleatorias
        run: |
          STORE_PASS=$(openssl rand -base64 24)
          KEY_PASS=$(openssl rand -base64 24)

          keytool -genkeypair -v \
            -keystore ergania-release.jks \
            -alias ergania \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -dname "CN=Ergania, OU=Ergania, O=Ergania, L=Santiago, ST=RM, C=CL"

          mkdir -p out
          mv ergania-release.jks out/
          cat > out/LEEME.txt <<EOF
          Guarda estos 4 valores como Secrets del repo (Settings > Secrets and
          variables > Actions > New repository secret) y borra este archivo
          después. No lo subas al repo, no lo mandes por chat sin cifrar.

          ANDROID_KEYSTORE_BASE64 = (ver keystore.base64.txt en este mismo zip)
          ANDROID_KEYSTORE_PASSWORD = $STORE_PASS
          ANDROID_KEY_ALIAS = ergania
          ANDROID_KEY_PASSWORD = $KEY_PASS
          EOF
          base64 -w0 out/ergania-release.jks > out/keystore.base64.txt

      - name: Subir keystore + passwords como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ergania-release-keystore
          path: out/
          retention-days: 7
