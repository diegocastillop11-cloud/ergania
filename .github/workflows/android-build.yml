name: Build APK Android

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm install

      - name: Build web (modo Capacitor)
        working-directory: frontend
        run: npm run build:capacitor

      - name: Sync Android
        working-directory: frontend
        run: npx cap sync android

      - name: Restaurar keystore de firma
        working-directory: frontend/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/ergania-release.jks
          cat > keystore.properties <<EOF
          storeFile=app/ergania-release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK firmado
        working-directory: frontend/android
        run: ./gradlew assembleRelease

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ergania-android-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
